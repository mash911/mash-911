      x="256"
      y="220"
      text-anchor="middle"
      font-size="172"
      font-weight="700"
      font-family="'Noto Naskh Arabic', 'Segoe UI', serif"
      fill="#06595b"
      stroke="#ffffff"
      stroke-width="16"
      paint-order="stroke fill"
    >
