    <path d="M238 252c0-10 8-18 18-18h2c10 0 18 8 18 18v20c0 10-8 18-18 18h-2c-10 0-18-8-18-18z" fill="#ffffff" />
    <path d="M258 252c0-3 2-5 5-5s5 2 5 5v20c0 3-2 5-5 5s-5-2-5-5z" fill="#06595b" />
    <path d="M284 252c18 7 27 26 22 44" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
    <path d="M295 259c11 5 16 17 13 29" fill="none" stroke="#06595b" stroke-width="8" stroke-linecap="round" />
  </g>

  <g transform="translate(28 338)">
    <path d="M16 8h424l-24 104H40z" fill="url(#banner)" />
    <path d="M16 8L0 52l22 24 18-24z" fill="#d67f00" />
    <path d="M440 8l16 44-22 24-18-24z" fill="#d67f00" />
    <text
      x="228"
      y="80"
      text-anchor="middle"
      font-size="66"
